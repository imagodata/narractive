# =============================================================================
# Video Automation — Docker Compose
# =============================================================================
#
# Usage:
#   docker compose build
#   docker compose run --rm video --all --sequences-package my_plugin.sequences
#   docker compose run --rm video --diagrams --diagrams-module my_plugin.diagrams
#   docker compose run --rm video --narration --narrations-file narrations.yaml
#   docker compose run --rm video --list --sequences-package my_plugin.sequences
#   docker compose run --rm video --dry-run --all --sequences-package my_plugin.sequences
# =============================================================================

services:
  video:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-automation:latest

    environment:
      - DISPLAY=:99
      - RESOLUTION=1920x1080x24
      - CAPTURE_FPS=10
      - PROJECT_NAME=MyProject
      - QGIS_PROJECT=/data/project.qgz

    volumes:
      - ./output:/app/output
      - ./data:/data:ro
      # Mount your QGIS plugin:
      # - /path/to/my_plugin:/root/.local/share/QGIS/QGIS3/profiles/default/python/plugins/my_plugin:ro

    shm_size: '2gb'
