# =============================================================================
# Video Automation — Configuration Template
# =============================================================================
# Copy this file to config.yaml and adjust values for your project.
# Run `video-automation --calibrate` to set UI positions interactively.

obs:
  host: localhost
  port: 4455
  password: ''
  scenes:
    main: Main
    app_with_panel: App + Panel
    diagram_overlay: Diagram Overlay
    intro_scene: Intro
    outro_scene: Outro
  output_dir: ~/Videos/MyProject
  recording_format: mkv

app:
  window_title: ''             # Title (or substring) of your target application
  panel_name: ''               # Name of a dock panel to focus (optional)
  startup_wait: 5
  regions:
    # ── Side panel / dock widget ──────────────────────────────────
    plugin_dock:
      x: 1941
      y: 247
      width: 610
      height: 1231
    # ── Main canvas / viewport ────────────────────────────────────
    main_canvas:
      x: 434
      y: 236
      width: 1500
      height: 1246
    # ── Application menus (example) ───────────────────────────────
    # menu_extensions:
    #   x: 386
    #   y: 49
    # menu_extensions_manage:
    #   x: 397
    #   y: 80
    # ── Add your calibrated regions below ─────────────────────────
    # my_button:
    #   x: 2000
    #   y: 500

timing:
  click_delay: 0.3
  type_delay: 0.05
  scroll_delay: 0.2
  action_pause: 1.0
  transition_pause: 2.0
  mouse_move_duration: 0.5

diagrams:
  output_dir: output/diagrams
  width: 2560
  height: 1440
  theme: dark
  background_color: '#1a1a2e'
  font_family: Segoe UI

narration:
  engine: edge-tts             # edge-tts | elevenlabs | f5-tts | xtts-v2 | kokoro | openai
  voice: fr-FR-HenriNeural     # Microsoft Neural TTS voice
  output_dir: output/narration
  speed: +0%
  # F5-TTS options (optional):
  # f5_ref_audio: output/narration/ref_voice.wav
  # f5_ref_text: "Reference transcription text..."
  # f5_model: F5TTS_v1_Base
  # f5_speed: 1.0
  # f5_conda_env: f5-tts
  # f5_remove_silence: false
  # Kokoro TTS options (ultra-fast local TTS, no voice cloning):
  # kokoro_lang: fr             # en, en-gb, fr, pt, pt-br, es, it, ja, zh, hi, ko
  # kokoro_voice: ff_siwis      # Simple voice name (see kokoro_bridge.py for defaults)
  # kokoro_speed: 1.0
  # kokoro_conda_env:           # Optional: conda env name (omit to use current Python)
  # kokoro:
  #   # Voice mixing (blend two or more voices with weights):
  #   voices:
  #     - voice: ff_siwis
  #       weight: 0.7
  #     - voice: ff_alpha
  #       weight: 0.3
  #   # OR custom voice pack (.pt file):
  #   # voice_file: /path/to/my_voice.pt
  # OpenAI TTS options (cloud-based, high quality, ~$15/M chars for tts-1-hd):
  # openai:
  #   api_key: ${OPENAI_API_KEY}   # or set OPENAI_API_KEY env var
  #   model: tts-1-hd              # tts-1 (faster, cheaper) or tts-1-hd (higher quality)
  #   voice: alloy                  # alloy, echo, fable, onyx, nova, shimmer
  #   speed: 1.0                    # 0.25–4.0
  #   format: mp3                   # mp3, opus, aac, flac

capture:
  fps: 10
  output_dir: output/captures
  resolution: 2560x1440
  display: ':99'
  method: import               # import | scrot | xdotool | ffmpeg
  codec: libx264
  quality: 23
  format: mp4
  scenes:
    qgis_fullscreen: QGIS Fullscreen
    qgis_with_plugin: QGIS + Plugin
    diagram_overlay: Diagram Overlay
    intro_scene: Intro
    outro_scene: Outro

output:
  final_dir: output/final
  resolution: 2560x1440
  fps: 30
  codec: libx264
  quality: '23'
