diagrams:
  output_dir: output/diagrams
  width: 2560
  height: 1440
  theme: dark
  background_color: '#1a1a2e'
  font_family: Segoe UI
narration:
  engine: edge-tts
  voice: fr-FR-HenriNeural
  output_dir: output/narration
  speed: +0%
  f5_ref_audio: output/narration/ref_voice.wav
  f5_ref_text: et de la noblesse de leurs petites façons ; il avait besoin de laver
    son imagination de toutes les façons d'agir vulgaires, de toutes les pensées désagréables
    au milieu desquelles il respirait à Verrières.
  f5_model: F5TTS_v1_Base
  f5_speed: 1.0
  f5_conda_env: f5-tts
  f5_remove_silence: false
capture:
  fps: 10
  output_dir: output/captures
  resolution: 2560x1440
  display: :99
  method: import
  codec: libx264
  quality: 23
  format: mp4
  scenes:
    qgis_fullscreen: QGIS Fullscreen
    qgis_with_filtermate: QGIS + FilterMate
    diagram_overlay: Diagram Overlay
